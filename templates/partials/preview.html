<div class="preview-container">
    <div class="split-view">
        <!-- PDF 预览区域 -->
        <div class="pdf-preview-section">
            <h3>PDF 预览</h3>
            <iframe src="{{preview_url}}" class="preview-frame" frameborder="0" ></iframe>
        </div>
        
        <!-- AI 分析区域 -->
        <div class="ai-analysis-section">
            <h3>AI 课程分析</h3>
            <div class="ai-controls">
                <button id="analyzeBtn" class="btn-animate btn-animate__shiny" hx-get = "/ai_analysis/{{file_id}}" hx-target="#analysisResult" hx-swap="outerHTML">开始AI分析</button>
                <button id="stopBtn" class="btn-animate btn-animate__shiny" style="display:none;" onclick="stopAnalysis()">停止分析</button>
            </div>
            
            <div id="analysisResult" class="markdown-content">
                <p>点击上方按钮开始AI分析PDF内容...</p>
            </div>
        </div>
    </div>
</div>
